server:
    port: 8081
spring:
    application:
        name: '@project.artifactId@'
        version: '@project.version@'
    datasource:
        generate-unique-name: false
        name: shopping-list-manager
        password: sa
    h2:
        console:
            enabled: true
    jackson:
        default-property-inclusion: non_null
        deserialization:
            fail-on-unknown-properties: false
    jpa:
        hibernate:
            ddl-auto: create
        properties:
            hibernate:
                jdbc:
                    time_zone: UTC
        open-in-view: false
        show-sql: true